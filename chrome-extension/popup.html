<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 380px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; color: #333; }
h2 { font-size: 16px; margin-bottom: 12px; color: #1a73e8; }
.field { margin-bottom: 10px; }
label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 12px; color: #555; }
input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
textarea { width: 100%; height: 80px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-family: monospace; resize: vertical; }
.btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; margin-right: 6px; margin-top: 8px; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-secondary { background: #e8eaed; color: #333; }
.btn-secondary:hover { background: #d2d5d9; }
.btn-danger { background: #ea4335; color: #fff; }
.btn-danger:hover { background: #c5221f; }
#status { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; display: none; }
.success { background: #e6f4ea; color: #137333; display: block !important; }
.error { background: #fce8e6; color: #c5221f; display: block !important; }
.info { background: #e8f0fe; color: #1a73e8; display: block !important; }
.cookie-count { font-size: 12px; color: #666; margin-bottom: 8px; }
hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
</style>
</head>
<body>
  <h2>🔑 720云 Cookie 同步</h2>
  
  <div class="field">
    <label>代理地址</label>
    <input type="text" id="proxyUrl" value="http://localhost:7890" placeholder="http://localhost:7890">
  </div>
  
  <div class="field">
    <label>管理密钥</label>
    <input type="text" id="adminSecret" value="change-me-in-production" placeholder="Admin Secret">
  </div>
  
  <hr>
  
  <div class="cookie-count" id="cookieInfo">点击下方按钮抓取 Cookies</div>
  
  <div class="field">
    <label>Cookies 预览</label>
    <textarea id="cookiePreview" readonly placeholder="抓取后显示..."></textarea>
  </div>
  
  <div>
    <button class="btn btn-secondary" id="btnFetch">🔍 抓取 Cookies</button>
    <button class="btn btn-primary" id="btnSync">🚀 同步到代理</button>
  </div>
  <div>
    <button class="btn btn-secondary" id="btnCheck" style="margin-top:4px">📡 检查代理状态</button>
  </div>
  
  <div id="status"></div>

<script src="popup.js"></script>
</body>
</html>
