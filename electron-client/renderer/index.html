<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>共享会话浏览器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, "Microsoft YaHei", sans-serif; overflow: hidden; }

    #toolbar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 4px 8px;
      gap: 4px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
    }
    #toolbar button {
      width: 32px; height: 32px;
      border: 1px solid #bbb; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 16px;
    }
    #toolbar button:hover { background: #e0e0e0; }
    #toolbar button:active { background: #d0d0d0; }
    #btn-home {
      border-color: #722ed1 !important;
      background: #722ed1 !important;
      color: #fff;
      font-size: 18px;
    }
    #btn-home:hover { background: #9254de !important; }
    #url-bar {
      flex: 1; height: 32px;
      border: 1px solid #bbb; border-radius: 4px;
      padding: 0 8px; font-size: 13px;
    }
    #btn-go {
      width: 50px; height: 32px;
      border: 1px solid #1890ff; border-radius: 4px;
      background: #1890ff; color: #fff; cursor: pointer; font-size: 13px;
    }
    #btn-go:hover { background: #40a9ff; }
    #username {
      width: 100px; height: 32px;
      border: 1px solid #bbb; border-radius: 4px;
      padding: 0 8px; font-size: 13px;
    }
    #btn-reconnect {
      width: 36px; height: 32px;
      border: 1px solid #52c41a; border-radius: 4px;
      background: #52c41a; color: #fff; cursor: pointer; font-size: 16px;
    }
    #btn-reconnect:hover { background: #73d13d; }
    #proxy-url {
      width: 180px; height: 32px;
      border: 1px solid #bbb; border-radius: 4px;
      padding: 0 8px; font-size: 12px; color: #666;
    }

    /* 首页九宫格 */
    #home-view {
      position: fixed;
      top: 44px; left: 0; right: 0; bottom: 24px;
      overflow-y: auto;
      padding: 32px 24px;
      background: #fafafa;
    }
    #home-view.hidden { display: none; }
    .site-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .site-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: box-shadow 0.2s;
    }
    .site-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .site-icon {
      width: 48px; height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 8px;
    }
    .site-name { font-size: 14px; font-weight: 500; color: #333; }
    .site-url { font-size: 11px; color: #999; margin-top: 4px; word-break: break-all; text-align: center; }
    .close-btn {
      position: absolute; top: 6px; right: 6px;
      width: 20px; height: 20px;
      border: none; background: rgba(0,0,0,0.08);
      border-radius: 50%; cursor: pointer;
      font-size: 12px; color: #999;
      display: none;
      align-items: center; justify-content: center;
    }
    .close-btn:hover { background: rgba(255,0,0,0.15); color: #f00; }
    .site-card.cached .close-btn { display: flex; }
    .add-card { border: 2px dashed #d9d9d9; background: transparent; }
    .add-card:hover { border-color: #1890ff; }
    .add-card .site-icon { background: #f0f0f0 !important; color: #bbb !important; font-size: 28px; }
    .site-users { font-size: 11px; color: #8c8c8c; margin-top: 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

    /* 添加站点对话框 */
    .dialog-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .dialog { background: #fff; border-radius: 8px; padding: 24px; width: 400px; }
    .dialog h3 { margin-bottom: 16px; font-size: 16px; }
    .dialog input {
      display: block; width: 100%; height: 36px;
      border: 1px solid #d9d9d9; border-radius: 4px;
      padding: 0 12px; font-size: 14px;
      margin-bottom: 12px;
    }
    .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    .dialog-buttons button {
      height: 32px; padding: 0 16px;
      border: 1px solid #d9d9d9; border-radius: 4px;
      cursor: pointer; font-size: 13px; background: #fff;
    }
    .dialog-buttons .primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .dialog-error { color: #ff4d4f; font-size: 12px; margin-top: -8px; margin-bottom: 8px; }

    /* 状态栏 */
    #statusbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 24px;
      display: flex; align-items: center;
      padding: 0 12px; gap: 16px;
      background: #f5f5f5; border-top: 1px solid #ddd;
      font-size: 12px; color: #666;
    }
    .status-ok { color: #52c41a; }
    .status-loading { color: #faad14; }
    #status-online { position: relative; cursor: default; }
    #status-online .online-popup {
      display: none;
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #fff; border: 1px solid #d9d9d9; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      padding: 8px 0; margin-bottom: 6px;
      min-width: 120px; max-width: 200px;
      white-space: nowrap; z-index: 50;
    }
    #status-online:hover .online-popup { display: block; }
    .online-popup .op-item {
      padding: 3px 14px; font-size: 12px; color: #333;
      overflow: hidden; text-overflow: ellipsis;
    }
    .online-popup .op-empty { padding: 6px 14px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-home" title="首页">&#8962;</button>
    <button id="btn-back" title="后退">&#9664;</button>
    <button id="btn-forward" title="前进">&#9654;</button>
    <button id="btn-reload" title="刷新">&#8635;</button>
    <input id="url-bar" type="text" placeholder="输入网址...">
    <button id="btn-go">前往</button>
    <input id="proxy-url" type="text" placeholder="代理地址" title="修改后点击同步">
    <button id="btn-reconnect" title="保存代理地址并重新连接">&#10227;</button>
    <input id="username" type="text" placeholder="用户名">
  </div>

  <div id="home-view">
    <div class="site-grid" id="site-grid"></div>
  </div>

  <div id="add-site-dialog" class="dialog-overlay" style="display:none">
    <div class="dialog">
      <h3>添加站点</h3>
      <input id="site-name" type="text" placeholder="站点名称">
      <input id="site-url" type="url" placeholder="https://example.com">
      <div id="add-error" class="dialog-error" style="display:none"></div>
      <div class="dialog-buttons">
        <button id="btn-add-cancel">取消</button>
        <button id="btn-add-confirm" class="primary">添加</button>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span id="status-proxy">&#11044; 代理: 连接中...</span>
    <span id="status-sync"></span>
    <span id="status-online"><span class="online-text"></span><div class="online-popup"></div></span>
    <span id="status-user"></span>
    <span id="status-log" style="margin-left:auto;color:#999;font-size:11px"></span>
  </div>

  <script>
    const urlBar = document.getElementById('url-bar');
    const usernameInput = document.getElementById('username');
    const proxyUrlInput = document.getElementById('proxy-url');
    const statusProxy = document.getElementById('status-proxy');
    const statusSync = document.getElementById('status-sync');
    const statusOnline = document.getElementById('status-online');
    const statusUser = document.getElementById('status-user');
    const statusLog = document.getElementById('status-log');
    const homeView = document.getElementById('home-view');
    const siteGrid = document.getElementById('site-grid');
    const addDialog = document.getElementById('add-site-dialog');

    const cachedViewIds = new Set();
    const COLORS = ['#1890ff','#52c41a','#fa8c16','#722ed1','#eb2f96','#13c2c2','#f5222d','#2f54eb'];
    let currentClients = [];
    let currentSites = [];

    function siteColor(id) {
      let h = 0;
      for (const c of id) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
      return COLORS[Math.abs(h) % COLORS.length];
    }

    function renderSites(sites) {
      currentSites = sites;
      siteGrid.innerHTML = '';
      for (const site of sites) {
        const usersOnSite = currentClients.filter(c => c.activeSiteId === site.siteId).map(c => c.userName);
        const card = document.createElement('div');
        card.className = 'site-card' + (cachedViewIds.has(site.siteId) ? ' cached' : '');
        card.innerHTML = `
          <button class="close-btn" data-id="${site.siteId}" title="关闭视图">\u2715</button>
          <div class="site-icon" style="background:${siteColor(site.siteId)}">${site.name.charAt(0).toUpperCase()}</div>
          <div class="site-name">${site.name}</div>
          <div class="site-url">${site.targetUrl}</div>
          ${usersOnSite.length ? `<div class="site-users">\u{1F464} ${usersOnSite.join(', ')}</div>` : ''}
        `;
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('close-btn')) return;
          window.electronAPI.openSite(site.siteId);
        });
        card.querySelector('.close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          window.electronAPI.closeSiteView(site.siteId);
        });
        siteGrid.appendChild(card);
      }
      const addCard = document.createElement('div');
      addCard.className = 'site-card add-card';
      addCard.innerHTML = `
        <div class="site-icon">+</div>
        <div class="site-name" style="color:#999">添加站点</div>
      `;
      addCard.addEventListener('click', () => {
        document.getElementById('site-name').value = '';
        document.getElementById('site-url').value = '';
        document.getElementById('add-error').style.display = 'none';
        addDialog.style.display = 'flex';
      });
      siteGrid.appendChild(addCard);
    }

    document.getElementById('btn-add-cancel').onclick = () => { addDialog.style.display = 'none'; };
    document.getElementById('btn-add-confirm').onclick = async () => {
      const name = document.getElementById('site-name').value.trim();
      const targetUrl = document.getElementById('site-url').value.trim();
      const errEl = document.getElementById('add-error');
      if (!name || !targetUrl) {
        errEl.textContent = '请填写站点名称和 URL'; errEl.style.display = 'block'; return;
      }
      if (!/^https?:\/\//i.test(targetUrl)) {
        errEl.textContent = 'URL 必须以 http:// 或 https:// 开头'; errEl.style.display = 'block'; return;
      }
      try {
        const result = await window.electronAPI.addSite({ name, targetUrl });
        if (result.error) { errEl.textContent = result.error; errEl.style.display = 'block'; return; }
        addDialog.style.display = 'none';
        loadSites();
      } catch (e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
      }
    };

    async function loadSites() {
      try {
        const sites = await window.electronAPI.getSites();
        renderSites(sites);
      } catch (_) {
        siteGrid.innerHTML = '<div style="color:#999;text-align:center;grid-column:1/-1">加载站点失败</div>';
      }
    }

    // 初始化
    window.electronAPI.getConfig().then(cfg => {
      usernameInput.value = cfg.userName;
      proxyUrlInput.value = cfg.proxyUrl;
      statusProxy.innerHTML = `<span class="status-ok">\u2b24</span> 代理: ${cfg.proxyUrl}`;
      statusUser.textContent = `用户: ${cfg.userName}`;
      if (cfg.logPath) statusLog.textContent = `日志: ${cfg.logPath}`;
    });
    loadSites();

    // 工具栏
    function doNavigate() { const url = urlBar.value.trim(); if (url) window.electronAPI.navigate(url); }
    document.getElementById('btn-go').onclick = doNavigate;
    urlBar.addEventListener('keydown', e => { if (e.key === 'Enter') doNavigate(); });
    document.getElementById('btn-back').onclick = () => window.electronAPI.goBack();
    document.getElementById('btn-forward').onclick = () => window.electronAPI.goForward();
    document.getElementById('btn-reload').onclick = () => window.electronAPI.reload();
    document.getElementById('btn-home').onclick = () => window.electronAPI.goHome();

    usernameInput.addEventListener('change', () => {
      const name = usernameInput.value.trim();
      if (name) { window.electronAPI.setUsername(name); statusUser.textContent = `用户: ${name}`; }
    });
    proxyUrlInput.addEventListener('change', () => {
      const url = proxyUrlInput.value.trim();
      if (url) { window.electronAPI.setProxyUrl(url); statusProxy.innerHTML = `<span class="status-loading">\u2b24</span> 代理: ${url} (点击\u27f3同步)`; }
    });
    document.getElementById('btn-reconnect').onclick = () => {
      const url = proxyUrlInput.value.trim();
      if (url) window.electronAPI.setProxyUrl(url);
      statusProxy.innerHTML = `<span class="status-loading">\u2b24</span> 同步中...`;
      window.electronAPI.reconnect();
    };

    // 事件监听
    window.electronAPI.onSyncStatus(s => {
      if (s.ok) {
        statusProxy.innerHTML = `<span class="status-ok">\u2b24</span> 代理: ${proxyUrlInput.value}`;
        statusSync.textContent = `同步: rev${s.rev}, ${s.cookies} cookies`;
      } else {
        statusProxy.innerHTML = `<span class="status-loading">\u2b24</span> 代理: 未同步`;
      }
    });
    window.electronAPI.onUrlChanged(url => { urlBar.value = url; });
    window.electronAPI.onLoading(loading => {
      statusProxy.innerHTML = loading
        ? `<span class="status-loading">\u2b24</span> 加载中...`
        : `<span class="status-ok">\u2b24</span> 已连接`;
    });
    window.electronAPI.onSitesUpdated(sites => renderSites(sites));
    window.electronAPI.onClientsUpdated(clients => {
      currentClients = clients;
      statusOnline.querySelector('.online-text').textContent = `在线: ${clients.length}人`;
      const popup = statusOnline.querySelector('.online-popup');
      popup.innerHTML = clients.length
        ? clients.map(c => `<div class="op-item">${c.userName}</div>`).join('')
        : '<div class="op-empty">暂无在线用户</div>';
      if (homeView.classList.contains('hidden')) return;
      renderSites(currentSites);
    });
    window.electronAPI.onViewChanged(({ type, siteId }) => {
      if (type === 'home') { homeView.classList.remove('hidden'); urlBar.value = ''; }
      else if (type === 'site') { homeView.classList.add('hidden'); cachedViewIds.add(siteId); }
      else if (type === 'closed') { cachedViewIds.delete(siteId); if (!homeView.classList.contains('hidden')) loadSites(); }
    });
  </script>
</body>
</html>
